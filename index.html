<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="apple-touch-icon" href="icon.png">
</head>

<body>

<div class="container">
  <h1>💰 Controle Financeiro</h1>

  <div class="card">
    <h2 id="total">R$ 0</h2>
    <input type="month" id="filtroMes">
  </div>

  <div class="card">
    <h3>📊 Por Categoria</h3>
    <canvas id="graficoCategoria"></canvas>
  </div>

  <div class="card">
    <h3>📈 Evolução Mensal</h3>
    <canvas id="graficoMensal"></canvas>
  </div>

  <ul id="lista"></ul>

  <div class="card">
    <h3>📦 Backup</h3>
    <button onclick="exportar()">📤 Exportar</button>
    <input type="file" id="importarArquivo">
    <button onclick="importar()">📥 Importar</button>
  </div>
</div>

<!-- BOTÃO FLUTUANTE -->
<button id="fab" onclick="abrirModal()">＋</button>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h3>Novo Lançamento</h3>

    <form id="form">

      <select id="categoria" required>
        <option value="">Categoria</option>
        <option>Compras Apto</option>
        <option>Nubank</option>
        <option>Sicredi</option>
        <option>Condomínio Cyrela</option>
        <option>Parcela Terreno Cyrela</option>
        <option>Condomínio Apartamento</option>
        <option>Luz Apartamento</option>
        <option>Internet Apartamento</option>
        <option>Treino Gustavo</option>
        <option>Estacionamento</option>
        <option>IPTU Cyrela</option>
      </select>

      <input type="text" id="valor" placeholder="R$ 0,00" required>

      <input type="date" id="dataPagamento" required>
      <input type="month" id="competencia" required>

      <textarea id="comentario" placeholder="Comentário"></textarea>

      <button type="submit">Salvar</button>
      <button type="button" onclick="fecharModal()">Cancelar</button>

    </form>

  </div>
</div>

<!-- TOAST -->
<div id="toast">Salvo com sucesso!</div>

<script type="module" src="script.js"></script>

</body>
</html>
